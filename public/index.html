<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>洛谷陶片保存站</title>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M16.5595 0L16.2797 1.9926L16.2788 2.00192L13.3661 21.0724L32 29.8647L31.2365 31.5774L31.0491 32H0L0.275114 30.0093L0.27696 29.999L4.8679 0H16.5595ZM12.0976 29.3917H24.9043L12.9571 23.7544L12.0976 29.3917ZM2.96071 29.3917H9.5062L10.5402 22.6135L4.43321 19.7338L2.96071 29.3917ZM4.84311 17.0527L10.9501 19.9325L13.5951 2.60828H7.04864L4.84311 17.0527Z' fill='%23ad8b00' transform='translate(4 4) scale(0.75)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <h1>洛谷保存站 - 陶片放逐保存</h1>
  <p class="sub" id="sub">加载中…</p>

  <nav>
    <a href="#" id="nav-j" class="on" onclick="showTab('j')">记录</a>
    <a href="#" id="nav-l" onclick="showTab('l')">日志</a>
    <a href="#" id="nav-a" onclick="showTab('a')">API</a>
    <a href="#" id="nav-b" onclick="showTab('b')">关于</a>
    <a href="https://www.luogu.com.cn/judgement" target="_blank">原页面</a>
    <a href="https://www.luogu.me">返回保存站</a>
  </nav>

  <div id="j-filter" class="filter" style="flex-wrap:wrap">
    <input type="text" id="f-uid" placeholder="UID…" onkeydown="if(event.key==='Enter')loadJ()" style="width:85px">
    <input type="text" id="f-name" placeholder="用户名…" onkeydown="if(event.key==='Enter')loadJ()" style="width:100px">
    <span id="perm-toggle" class="toggle-btn"
      onclick="document.getElementById('perm-panel').classList.toggle('show')">权限筛选
      ▸</span>
    <button onclick="loadJ()">搜索</button>
    <button
      onclick="document.getElementById('f-uid').value='';document.getElementById('f-name').value='';jPage=1;clearPerms();loadJ()">清除</button>
    <span id="show-toggle" class="toggle-btn"
      onclick="document.getElementById('show-panel').classList.toggle('show')">显示选项
      ▸</span>
    <span style="font-size:.85rem;color:#888;margin-left:12px">每页：</span>
    <select onchange="LIMIT=+this.value;jPage=1;loadJ()">
      <option value="20">20</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="500">500</option>
    </select>
  </div>
  <div id="perm-panel" class="perm-panel">
    <div class="perm-col">
      <b style="color:#c00">移除</b>
      <div id="perm-rev"></div>
    </div>
    <div class="perm-col">
      <b style="color:#168f16">添加</b>
      <div id="perm-add"></div>
    </div>
    <div class="perm-col">
      <b style="color:#AD8B00">特殊</b>
      <div id="perm-special"></div>
    </div>
  </div>
  <div id="show-panel" class="perm-panel">
    <div class="perm-col">
      <b style="color:#c00">标记</b>
      <div id="show-opts-a"></div>
    </div>
    <div class="perm-col">
      <b style="color:#168f16">列</b>
      <div id="show-opts-b"></div>
    </div>
  </div>

  <div id="l-filter" class="filter" style="display:none">
    <span style="font-size:.85rem;color:#888">每页：</span>
    <select onchange="LIMIT=+this.value;lPage=1;loadL()">
      <option value="20">20</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="500">500</option>
    </select>
  </div>

  <div id="content">
    <div class="loading">加载中…</div>
  </div>
  <div class="foot" id="pager"></div>

  <footer>quanac-lcx/luogu-judgement-saver</footer>

  <button id="btn-top" title="返回顶部" onclick="scrollToTop()">↑</button>

  <script src="/script.js"></script>
</body>

</html>
